<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>익명 코드 채팅</title>
 <style>
  body {
    font-family: sans-serif;
    padding: 20px;
  }

  #chat {
    border: 1px solid #ccc;
    height: 500px;
    overflow-y: scroll;
    margin-bottom: 10px;
    padding: 10px;
    background: #f9f9f9;
  }

  .message-row {
    display: flex;
    margin-bottom: 10px;
  }

  .message-row.me {
    justify-content: flex-end;
  }

  .message-row.other {
    justify-content: flex-start;
  }

  .message-bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    word-break: break-word;
  }

  .message-row.me .message-bubble {
    background: #dbeafe;
    text-align: right;
  }

  .message-row.other .message-bubble {
    background: #e5e7eb;
    text-align: left;
  }

  .system-message {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin: 8px 0;
  }

  #message {
    width: 85%;
    padding: 12px;
    font-size: 16px;
    box-sizing: border-box;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

  <h2>코드 채팅방</h2>

  <div id="setup">
    <input type="text" id="nickname" placeholder="닉네임 입력" />
    <input type="text" id="roomCode" placeholder="방 코드 입력" />
    <button onclick="joinRoom()">입장하기</button>
  </div>

  <div id="chatRoom" class="hidden">
    <div id="chat"></div>
    <input type="text" id="message" placeholder="메시지 입력" />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
