<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실시간 메모</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #121212;
      color: #e0e0e0;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 18px;
      color: #e0e0e0;
    }

    h3 {
      margin-top: 0;
      font-size: 15px;
      color: #cfcfcf;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 14px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    #nickname, #roomCode {
      flex: 1;
      min-width: 180px;
    }

    button {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 10px 14px;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    #roomList {
      margin-top: 14px;
    }

    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 0;
      gap: 10px;
    }

    .room-code {
      font-weight: bold;
    }

    .room-meta {
      color: #999;
      font-size: 13px;
    }

    #chat {
      border: 1px solid #333;
      height: 420px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 10px;
      background: #1e1e1e;
      font-size: 14px;
    }

    .log-row {
      margin-bottom: 6px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 4px;
    }

    .me {
      color: #9cdcfe;
    }

    .other {
      color: #d4d4d4;
    }

    .time {
      color: #777;
      font-size: 12px;
      margin-left: 5px;
    }

    .system {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin: 5px 0;
    }

    #messageBar {
      display: flex;
      gap: 10px;
    }

    #message {
      flex: 1;
    }

    .hidden {
      display: none;
    }

    #topInfo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    #userCount {
      color: #999;
      font-size: 13px;
    }

    #notice {
      color: #777;
      font-size: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>실시간 메모</h2>

    <div id="setup" class="card">
      <div class="row">
        <input type="text" id="nickname" placeholder="이름 입력" />
        <input type="text" id="roomCode" placeholder="코드 입력" />
        <button onclick="joinRoom()">입장</button>
      </div>

      <div id="roomList">
        <h3>활성 방</h3>
        <div id="roomsContainer">불러오는 중...</div>
      </div>
    </div>

    <div id="chatRoom" class="card hidden">
      <div id="topInfo">
        <div>
          <strong id="currentRoomLabel">방:</strong>
          <span id="userCount">인원 0명</span>
        </div>
        <button onclick="leaveRoom()">나가기</button>
      </div>

      <div id="notice">새로 입장한 사용자는 이전 대화 기록을 볼 수 없습니다.</div>

      <div id="chat"></div>

      <div id="messageBar">
        <input type="text" id="message" placeholder="내용 입력" />
        <button onclick="sendMessage()">등록</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
