<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실시간 메모</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #121212;
      --text: #e0e0e0;
      --card: #1e1e1e;
      --border: #333;
      --input-bg: #181818;
      --muted: #9a9a9a;
      --soft: #777;
      --button-bg: #2a2a2a;
      --button-hover: #343434;
      --chat-bg: #181818;
      --line: #232323;
    }

    body.light-mode {
      --bg: #f5f5f5;
      --text: #111111;
      --card: #ffffff;
      --border: #d0d0d0;
      --input-bg: #ffffff;
      --muted: #666666;
      --soft: #777777;
      --button-bg: #efefef;
      --button-hover: #e0e0e0;
      --chat-bg: #ffffff;
      --line: #e8e8e8;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .hidden {
      display: none !important;
    }

    .app {
      height: calc(100vh - 32px);
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 600;
    }

    input, textarea, button {
      font-family: inherit;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 10px;
      outline: none;
    }

    textarea {
      resize: none;
    }

    button {
      background: var(--button-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
    }

    button:hover {
      background: var(--button-hover);
    }

    #setup {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
    }

    #roomListWrap {
      overflow: auto;
      min-height: 0;
    }

    #roomsContainer {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .room-name {
      font-weight: 700;
    }

    .room-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    #dashboard {
      flex: 1;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1.15fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 12px;
      overflow: hidden;
    }

    .panel {
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .memo-box {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .memo-box textarea {
      flex: 1;
      min-height: 0;
    }

    #noticePanel { grid-column: 1; grid-row: 1; }
    #memo8Panel  { grid-column: 2; grid-row: 1; }
    #todoPanel   { grid-column: 1; grid-row: 2; }
    #memo5Panel  { grid-column: 2; grid-row: 2; }
    #memo1Panel  { grid-column: 1; grid-row: 3; }
    #memo2Panel  { grid-column: 2; grid-row: 3; }

    #chatPanel {
      grid-column: 3;
      grid-row: 1 / span 3;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    #chatTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    #roomInfo {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    #currentRoomLabel {
      font-weight: 700;
      word-break: break-word;
    }

    #userCount {
      color: var(--muted);
      font-size: 13px;
    }

    #hostBadge {
      color: #c8a96a;
      font-size: 12px;
    }

    #chatNotice {
      color: var(--soft);
      font-size: 12px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    #chat {
      border: 1px solid var(--border);
      background: var(--chat-bg);
      border-radius: 6px;
      padding: 10px;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      height: 100%;
      overscroll-behavior: contain;
    }

    .log-row {
      margin-bottom: 6px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 5px;
      word-break: break-word;
      color: var(--text);
    }

    .me,
    .other {
      color: var(--text);
    }

    .time {
      color: var(--soft);
      font-size: 12px;
      margin-left: 5px;
    }

    .system {
      text-align: center;
      color: var(--soft);
      font-size: 12px;
      margin: 6px 0;
    }

    #messageBar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-top: 10px;
      flex-shrink: 0;
    }

    #leaveBtn,
    #themeBtn {
      white-space: nowrap;
    }

    #noticeText[readonly] {
      opacity: 0.9;
    }

    .save-note {
      margin-top: 8px;
      color: var(--soft);
      font-size: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .app {
        height: calc(100vh - 32px);
      }

      #dashboard {
        display: block;
        height: 100%;
        overflow: hidden;
      }

      #noticePanel,
      #memo8Panel,
      #todoPanel,
      #memo5Panel,
      #memo1Panel,
      #memo2Panel {
        display: none;
      }

      #chatPanel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        height: 100%;
        min-height: 0;
      }

      #setup {
        grid-template-columns: 1fr;
      }

      #messageBar {
        grid-template-columns: 1fr auto;
      }

      #themeBtn {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="setup" class="card">
      <input type="text" id="nickname" placeholder="이름 입력" />
      <input type="text" id="roomNameInput" placeholder="방이름 입력" />
      <input type="text" id="roomCodeInput" placeholder="코드 입력" />
      <button onclick="joinRoom()">입장</button>
    </div>

    <div id="roomListWrap" class="card">
      <h3>활성 방</h3>
      <div id="roomsContainer">불러오는 중...</div>
    </div>

    <div id="dashboard" class="hidden">
      <div id="noticePanel" class="card panel">
        <div class="panel-title">공지사항</div>
        <div class="memo-box">
          <textarea id="noticeText" placeholder="공지 입력"></textarea>
        </div>
        <div class="save-note" id="noticeHint">방장만 수정 가능</div>
      </div>

      <div id="memo8Panel" class="card panel">
        <div class="panel-title">보조 메모</div>
        <div class="memo-box">
          <textarea id="memo8" placeholder="메모"></textarea>
        </div>
      </div>

      <div id="todoPanel" class="card panel">
        <div class="panel-title">오늘 할 일</div>
        <div class="memo-box">
          <textarea id="memo4" placeholder="- 할 일 정리"></textarea>
        </div>
      </div>

      <div id="memo5Panel" class="card panel">
        <div class="panel-title">개인 메모</div>
        <div class="memo-box">
          <textarea id="memo5" placeholder="개인 메모"></textarea>
        </div>
      </div>

      <div id="memo1Panel" class="card panel">
        <div class="panel-title">자유 메모 1</div>
        <div class="memo-box">
          <textarea id="memo1" placeholder="메모"></textarea>
        </div>
      </div>

      <div id="memo2Panel" class="card panel">
        <div class="panel-title">자유 메모 2</div>
        <div class="memo-box">
          <textarea id="memo2" placeholder="메모"></textarea>
        </div>
      </div>

      <div id="chatPanel" class="card panel">
        <div>
          <div id="chatTop">
            <div id="roomInfo">
              <div id="currentRoomLabel">방이름:</div>
              <div id="myNicknameLabel">이름:</div>
              <div id="userCount">인원 0명</div>
              <div id="hostBadge"></div>
            </div>
            <button id="leaveBtn" onclick="leaveRoom()">나가기</button>
          </div>
          <div id="chatNotice">새로 입장한 사용자는 이전 대화 기록을 볼 수 없습니다.</div>
        </div>

        <div id="chat"></div>

        <div id="messageBar">
          <input type="text" id="message" placeholder="내용 입력" maxlength="300" />
          <button onclick="sendMessage()">등록</button>
          <button id="themeBtn" onclick="toggleTheme()">모드</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
