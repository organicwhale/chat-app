<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>익명 코드 채팅</title>
 <style>
  body {
    font-family: sans-serif;
    padding: 20px;
    background: #121212;
    color: #e0e0e0;
  }

  h2 {
    color: #e0e0e0;
  }

  #chat {
    border: 1px solid #333;
    height: 500px;
    overflow-y: scroll;
    margin-bottom: 10px;
    padding: 10px;
    background: #1e1e1e;
  }

  .message-row {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a2a2a;
  }

  .message-row.me {
    text-align: right;
  }

  .message-row.other {
    text-align: left;
  }

  .message-bubble {
    display: inline-block;
    max-width: 70%;
  }

  .message-row.me .message-bubble {
    color: #9cdcfe;
  }

  .message-row.other .message-bubble {
    color: #d4d4d4;
  }

  .system-message {
    text-align: center;
    color: #777;
    font-size: 13px;
    margin: 8px 0;
  }

  input {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #e0e0e0;
  }

  #message {
    width: 85%;
    padding: 12px;
    font-size: 15px;
    box-sizing: border-box;
  }

  button {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 10px 14px;
    cursor: pointer;
  }

  button:hover {
    background: #3a3a3a;
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

  <h2>코드 채팅방</h2>

  <div id="setup">
    <input type="text" id="nickname" placeholder="닉네임 입력" />
    <input type="text" id="roomCode" placeholder="방 코드 입력" />
    <button onclick="joinRoom()">입장하기</button>
  </div>

  <div id="chatRoom" class="hidden">
    <div id="chat"></div>
    <input type="text" id="message" placeholder="메시지 입력" />
    <button onclick="sendMessage()">전송</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
