<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>실시간 메모</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #121212;
      color: #e0e0e0;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #e0e0e0;
    }

    #chat {
      border: 1px solid #333;
      height: 500px;
      overflow-y: scroll;
      margin-bottom: 10px;
      padding: 10px;
      background: #1e1e1e;
      font-size: 14px;
    }

    .log-row {
      margin-bottom: 6px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 4px;
    }

    .me {
      color: #9cdcfe;
    }

    .other {
      color: #d4d4d4;
    }

    .time {
      color: #777;
      font-size: 12px;
      margin-left: 5px;
    }

    .system {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin: 5px 0;
    }

    input {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px;
      font-size: 14px;
    }

    #message {
      width: 80%;
    }

    button {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      padding: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <h2>실시간 메모</h2>

  <div id="setup">
    <input type="text" id="nickname" placeholder="이름 입력" />
    <input type="text" id="roomCode" placeholder="코드 입력" />
    <button onclick="joinRoom()">입장</button>
  </div>

  <div id="chatRoom" class="hidden">
    <div id="chat"></div>

    <input type="text" id="message" placeholder="내용 입력" />
    <button onclick="sendMessage()">등록</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>

</body>
</html>
